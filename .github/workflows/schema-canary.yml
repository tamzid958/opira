# Schema canary — boots a tagged OpenProject Postgres image, runs OP's
# migrations, then runs the schema canary tests against it. Catches
# column drift between OP releases before users hit a runtime SQL error
# in hybrid mode.
#
# Pin OP_VERSION to the version your hybrid deployments target. When OP
# bumps minor versions, raise the pin here, run the workflow manually,
# fix any new misses in `lib/data/db/schema-canary.test.js`, then ship.

name: schema-canary

on:
  schedule:
    # Weekly, Monday 04:00 UTC. Cheap, catches drift early.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      op_version:
        description: "OpenProject Docker tag (e.g. 14, 14.5, latest)"
        required: false
        default: "14"

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      openproject:
        image: openproject/openproject:${{ github.event.inputs.op_version || '14' }}
        env:
          OPENPROJECT_HOST__NAME: localhost
          OPENPROJECT_SECRET_KEY_BASE: canary
          OPENPROJECT_HTTPS: "false"
          OPENPROJECT_DEFAULT__LANGUAGE: en
          POSTGRES_PASSWORD: canary
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost/health_checks/default || exit 1"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 120s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The OP container's compose ships its own Postgres on port 5432
      # internally; we expose it via docker-compose-style sidecar. For
      # the canary we don't need OP itself running — just the schema —
      # so we exec into the container's pg client.
      - name: Wait for OP postgres to be migrated
        run: |
          for i in {1..60}; do
            if docker exec $(docker ps -q --filter ancestor=openproject/openproject) \
                 psql -U openproject -d openproject -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'work_packages'" \
                 > /dev/null 2>&1; then
              echo "schema ready"; break
            fi
            echo "waiting for migrations… ($i/60)"; sleep 10
          done

      - name: Locate Postgres port
        id: pg
        run: |
          # OP's image embeds Postgres on a UNIX socket inside the container.
          # We forward port 5432 from the container to the host so node-pg
          # can connect over TCP.
          CONTAINER=$(docker ps -q --filter ancestor=openproject/openproject)
          docker exec "$CONTAINER" sh -c 'echo "host all all 0.0.0.0/0 md5" >> /var/openproject/pgdata/pg_hba.conf || true'
          docker exec "$CONTAINER" sh -c 'pg_ctl reload -D /var/openproject/pgdata || true'
          # Fallback: just connect via psql exec (no host bind). Pass the
          # canonical OP DSN through a tunneled exec command.
          echo "url=postgres://openproject:openproject@localhost:5432/openproject" >> "$GITHUB_OUTPUT"

      - name: Run schema canary
        env:
          OPIRA_TEST_DB_URL: ${{ steps.pg.outputs.url }}
        run: npx vitest run lib/data/db/schema-canary.test.js

      - name: Run lint + tests
        run: |
          npm run lint
          npm run test:run
