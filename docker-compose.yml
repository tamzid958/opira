# Opira production stack: Next.js (standalone) container + Redis,
# exposed on port 3000. Put a TLS-terminating reverse proxy in front of
# it (nginx, Traefik, your cloud's load balancer) — this stack is the
# app only, not the edge.
#
# Quick start (no clone needed)
#   1. curl -fsSLO https://raw.githubusercontent.com/tamzid958/opira/main/docker-compose.yml
#      curl -fsSLO https://raw.githubusercontent.com/tamzid958/opira/main/.env.local.example
#      mv .env.local.example .env
#      $EDITOR .env             # fill in OAuth client / secret / AUTH_SECRET / AUTH_URL
#                               # set OPIRA_REDIS_URL=redis://redis:6379 to wire Opira
#                               # to the Redis service below
#   2. docker compose up -d
#   3. Visit http://localhost:3000
#
# To upgrade later: `docker compose pull && docker compose up -d`. No
# rebuild — every env var is read at request time, same image across envs.
#
# To build from source instead of pulling: `docker compose up -d --build`
# (works because both `image:` and `build:` are declared below).

services:
  opira:
    image: ghcr.io/tamzid958/opira:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy

  # Backs the planning-poker rooms in `lib/poker/redis-store.js`. Set
  # OPIRA_REDIS_URL=redis://redis:6379 in `.env` to wire Opira to this
  # service. If OPIRA_REDIS_URL is unset, Opira ignores this service
  # and falls back to a single-process in-memory store (still works,
  # but rooms don't fan out across pods).
  #
  # Persistence: AOF is enabled so a container restart mid-vote
  # doesn't reset the round — keys come back with their original 30-min
  # TTL still ticking. Memory is capped at 64 MB with allkeys-lru so
  # a runaway producer can't OOM the host or fill the AOF disk.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # ⚠ Do NOT add a `ports:` mapping here. This Redis has no
    # password (the network IS the auth boundary). Opira reaches it
    # as `redis://redis:6379` over Compose's internal bridge — that's
    # the only path that should exist. If you ever need to inspect
    # it, exec in: `docker compose exec redis redis-cli`.

  # Optional: auto-pull new images and restart the container when a
  # new release lands on ghcr.io. Polls every 6h. Comment out the whole
  # block if you'd rather upgrade manually (or pair it with the in-app
  # "new version available" banner).
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 21600 opira
    profiles:
      - autoupdate

volumes:
  redis-data:
